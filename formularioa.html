    <!-- EDUKIA -->
    <section id="formularioa">

        <form>
            <label for="izena">Izena:</label><br>
            <input type="text" id="izena" name="izena" placeholder="Zure izena edo enpresarena"><br><br>

            <label for="email">Emaila:</label><br>
            <input type="email" id="email" name="email" placeholder="zure@email.com"><br><br>

            <label for="telefonoa">Telefonoa:</label><br>
            <input type="tel" id="telefonoa" name="telefonoa" placeholder="Adibidez: 666123456"><br><br>

            <label for="mota">Zer motatako ekipo edo osagaiak emango dituzu?</label><br>
            <select id="mota" name="mota">
                <option value="">Aukeratu</option>
                <option value="ordenagailu_berezi">Ordenagailu osatua</option>
                <option value="portatil">Portatil</option>
                <option value="osagaiak">Osagaiak (RAM, CPU, Grafiko, etab.)</option>
                <option value="beste">Beste bat</option>
            </select><br><br>

            <label for="mezua">Mezua:</label><br>
            <textarea id="mezua" name="mezua"
                placeholder="Mesedez, gehitu informazio gehigarria, egoera, kopurua, etab."></textarea><br><br>

            <button type="submit">Bidali</button>
        </form>
    </section>
