    <section id="create-user">
        <h1>CREATE USER</h1>

        <div class="register-box">
            <form method="get">
                <label for="izena"><i class="fa fa-id-card"></i> First Name:</label>
                <input type="text" id="izena" name="izena" placeholder="Your first name" required>

                <label for="abizena"><i class="fa fa-id-badge"></i> Last Name:</label>
                <input type="text" id="abizena" name="abizena" placeholder="Your last name" required>

                <label for="helbidea"><i class="fa fa-home"></i> Address:</label>
                <input type="text" id="helbidea" name="helbidea" placeholder="Your street address" required>

                <label for="telefonoa"><i class="fa fa-phone"></i> Phone:</label>
                <input type="text" id="telefonoa" name="telefonoa" maxlength="9" minlength="9" placeholder="XXXXXXXXX"
                    required>

                <label for="erabiltzailea"><i class="fa fa-user"></i> Username (Email):</label>
                <input type="email" id="erabiltzailea" name="erabiltzailea" placeholder="Your email" required>

                <label for="pasahitza"><i class="fa fa-key"></i> Password:</label>
                <input type="password" id="pasahitza" name="pasahitza" placeholder="Type here" required>

                <button type="submit">Create</button>
            </form>
        </div>
    </section>
