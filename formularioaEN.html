    <!-- CONTENT -->
    <section id="formularioa">

        <form>
            <label for="izena">Name:</label><br>
            <input type="text" id="izena" name="izena" placeholder="Your name or company name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="your@email.com"><br><br>

            <label for="telefonoa">Phone:</label><br>
            <input type="tel" id="telefonoa" name="telefonoa" placeholder="Example: 666123456"><br><br>

            <label for="mota">What type of equipment or components will you provide?</label><br>
            <select id="mota" name="mota">
                <option value="">Select</option>
                <option value="ordenagailu_berezi">Complete computer</option>
                <option value="portatil">Laptop</option>
                <option value="osagaiak">Components (RAM, CPU, GPU, etc.)</option>
                <option value="beste">Other</option>
            </select><br><br>

            <label for="mezua">Message:</label><br>
            <textarea id="mezua" name="mezua"
                placeholder="Please include additional information, condition, quantity, etc."></textarea><br><br>

            <button type="submit">Send</button>
        </form>
    </section>
